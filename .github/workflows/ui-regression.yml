name: UI Regression Gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  p1-ui-regression:
    name: P1 UI regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run P1 UI regression tests (must pass)
        run: npm run test:ui

      - name: Push log confirmation
        if: success()
        run: echo "P1 UI regression tests ran and passed."

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
